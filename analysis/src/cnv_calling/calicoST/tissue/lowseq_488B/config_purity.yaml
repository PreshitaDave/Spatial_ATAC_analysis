# CalicoST configuration: tumor purity estimation for lowseq_488B
# Run with: python 3_run_purity.py tissue/lowseq_488B/config_purity.yaml
#
# Normal reference: mosaicfield-derived per-spot tumor purity from Xenium single-cell
# alignment. Spots with tumor_purity < 0.1 (5328/11477 spots, dominated by Myeloid,
# Fibroblast_CAF, T cell, B cell; zero Tumor_Epithelial) are used as normal reference.
# Generated by: analysis/src/cnv_calling/calicoST/tissue/lowseq_488B/extract_488B_normals.py
# Source: analysis/src/alignment/mosaicfield_outputs/per_spot_tumor_purity.csv

# --- I/O ---
spaceranger_dir : /projectnb/paxlab/presh/projects/spatial_atac/Data/04_analysis/cnv/calicoST/lowseq_488B/parsed_inputs
snp_dir         : /projectnb/paxlab/presh/projects/spatial_atac/Data/04_analysis/cnv/calicoST/lowseq_488B/parsed_inputs
output_dir      : /projectnb/paxlab/presh/projects/spatial_atac/Data/04_analysis/cnv/calicoST/lowseq_488B/purity

# Mosaicfield-derived normal barcodes (Xenium cell type labels mapped to ATAC spots)
normalidx_file  : /projectnb/paxlab/presh/projects/spatial_atac/analysis/binsize_comparison/normal_barcodes/lowseq_488B_normal_barcodes.csv

tumorprop_file          : None
supervision_clone_file  : None
alignment_files         :
bafonly                 : False

# --- Reference files ---
geneticmap_file    : /projectnb/paxlab/presh/software/CalicoST/GRCh38_resources/genetic_map_GRCh38_merged.tab.gz
hgtable_file       : /projectnb/paxlab/presh/software/CalicoST/GRCh38_resources/hgTables_hg38_gencode.txt
filtergenelist_file: /projectnb/paxlab/presh/software/CalicoST/GRCh38_resources/ig_gene_list.txt
filterregion_file  : /projectnb/paxlab/presh/software/CalicoST/GRCh38_resources/HLA_regions.bed

# --- Preprocessing ---
secondary_min_umi          : 400
min_snpumi_perspot         : 50
min_percent_expressed_spots: 0.005

# --- Phase switch probability ---
nu             : 1.0
logphase_shift : -2.0
npart_phasing  : 3

# --- HMRF (purity uses more clones to capture purity variation) ---
n_clones                    : 5
n_clones_rdr                : 2
min_spots_per_clone         : 50
min_avgumi_per_clone        : 5
maxspots_pooling            : 19
tumorprop_threshold         : 0.5
max_iter_outer              : 20
nodepotential               : weighted_sum
initialization_method       : rectangle
num_hmrf_initialization_start: 0
num_hmrf_initialization_end  : 1
spatial_weight              : 1.0
construct_adjacency_method  : hexagon
construct_adjacency_w       : 1.0

# --- HMM ---
n_states           : 7
params             : smp
t                  : 1-1e-4
t_phaseing         : 0.9999
fix_NB_dispersion  : False
shared_NB_dispersion: True
fix_BB_dispersion  : False
shared_BB_dispersion: True
max_iter           : 30
tol                : 0.0001
gmm_random_state   : 0
np_threshold       : 1.0
np_eventminlen     : 10

# --- Integer copy number ---
nonbalance_bafdist : 1.0
nondiploid_rdrdist : 10.0
